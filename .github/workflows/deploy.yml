name: Deploy Backend to Cloud Run

# Trunk-based: master is the single source of truth.
# The FRONTEND is deployed automatically by Firebase App Hosting (connected to the
# master branch), so this workflow only deploys the backend to Cloud Run.
# Requires repo secrets: GCP_PROJECT_ID, GCP_SA_KEY (service-account JSON key with
# Cloud Run + Artifact Registry + Cloud Build access).
on:
  push:
    branches: [ master ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Google Auth
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v1'

      - name: 'Artifact Registry Auth'
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push Backend
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/payroll/backend:${{ github.sha }} ./backend
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/payroll/backend:${{ github.sha }}

      - name: Deploy Backend to Cloud Run
        uses: 'google-github-actions/deploy-cloudrun@v1'
        with:
          service: 'payroll-backend'
          image: 'us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/payroll/backend:${{ github.sha }}'
          region: '${{ env.REGION }}'
          flags: '--allow-unauthenticated'
          env_vars: |
            GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }}
